project_id: blitz

# ── Model Authorization Policy ────────────────────────────────────────
# Uses the shared role set; project-specific overrides can be added later.
model_policy:
  allowed_roles:
    worker:
      - worker_model
    primary_reviewer:
      - primary_reviewer_model
    secondary_reviewer:
      - secondary_reviewer_model
    classifier:
      - classifier_model
    bookkeeping_reviewer:
      - bookkeeping_reviewer_model

  denied_model_refs: []

  role_requirements:
    secondary_reviewer:
      escalation_tier: high

    bookkeeping_reviewer:
      task_type:
        - docs
        - bookkeeping

subsystems: []

validation:
  build: "echo 'Build command not yet configured for Blitz'"
  test: "echo 'Test command not yet configured for Blitz'"

vault:
  queue_tasks: queue-tasks
  features: features
  systems: systems
  memory: memory
  reports: ../reports/subagents
